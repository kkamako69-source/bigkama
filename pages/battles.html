<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battles Page</title>
</head>
<body>
    <h1>Battles</h1>
    <p>Submit your punchlines and vote for your favorites!</p>

    <form id="punchline-form">
        <label for="punchline">Enter your punchline:</label><br>
        <input type="text" id="punchline" name="punchline" required><br>
        <button type="submit">Submit</button>
    </form>

    <h2>Submitted Punchlines</h2>
    <ul id="punchline-list"></ul>

    <script>
        const form = document.getElementById('punchline-form');
        const punchlineList = document.getElementById('punchline-list');

        let punchlines = [];

        form.onsubmit = function(e) {
            e.preventDefault();
            const punchlineInput = document.getElementById('punchline');
            const punchline = punchlineInput.value;
            punchlines.push(punchline);
            punchlineInput.value = '';
            renderPunchlines();
        };

        function renderPunchlines() {
            punchlineList.innerHTML = '';
            punchlines.forEach((line, index) => {
                const li = document.createElement('li');
                li.textContent = line;
                punchlineList.appendChild(li);
            });
        }
    </script>
</body>
</html>
